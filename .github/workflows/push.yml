name: Rappel mensuel (push)

on:
  schedule:
    # Rappel mensuel : les 1er, 2 et 3 du mois, toutes les 2h de 7h à 19h UTC
    # (~9h-21h en France, l'été). Le service worker décide à chaque tic s'il
    # affiche le rappel (et s'arrête tout seul dès que le plan du mois est fait).
    # NB : GitHub peut retarder/sauter un créneau (planning "au mieux") et le
    # décalage été/hiver déplace la fenêtre d'environ 1h — sans importance ici.
    - cron: '0 7-19/2 1-3 * *'
  workflow_dispatch:        # permet de lancer un envoi manuel pour tester
    inputs:
      force:
        description: 'Forcer la notif (test : ignore jour/heure/anti-spam)'
        type: boolean
        default: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install web-push@^3 --no-save
      - run: node scripts/send-push.mjs
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          FORCE: ${{ github.event.inputs.force }}
