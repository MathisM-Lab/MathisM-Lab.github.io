name: Rappel mensuel (push)

on:
  schedule:
    # Battement régulier : toutes les heures, le 1er et le 2 du mois, de 7h à 19h UTC
    # (~9h-21h en France). Le service worker décide à chaque tic s'il affiche le
    # rappel (et s'arrête tout seul dès que l'investissement du mois est saisi).
    - cron: '0 7-19 1,2 * *'
  workflow_dispatch:        # permet de lancer un envoi manuel pour tester

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install web-push@^3 --no-save
      - run: node scripts/send-push.mjs
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
